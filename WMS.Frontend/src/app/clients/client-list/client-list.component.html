<div class="page-container">
  <div class="page-header">
    <div class="header-title">
      <h1>Clients</h1>
      <p class="subtitle">Manage external clients</p>
    </div>
    <div class="header-actions">
      <div class="search-box">
        <mat-icon>search</mat-icon>
        <input type="text" placeholder="Search clients..." [(ngModel)]="searchTerm" (keyup.enter)="onSearch()" (input)="onSearch()">
      </div>
      <button mat-flat-button color="primary" (click)="openAddForm()" *ngIf="isAdmin">
        <mat-icon>add</mat-icon>
        New Client
      </button>
    </div>
  </div>

  <div class="content-card mat-elevation-z2">
    <div class="loading-shade" *ngIf="isLoading">
      <mat-spinner></mat-spinner>
    </div>

    <table mat-table [dataSource]="clients" class="w-100">

      <ng-container matColumnDef="clientId">
        <th mat-header-cell *matHeaderCellDef> ID </th>
        <td mat-cell *matCellDef="let client"> {{client.clientId}} </td>
      </ng-container>

      <ng-container matColumnDef="clientName">
        <th mat-header-cell *matHeaderCellDef> Client Name </th>
        <td mat-cell *matCellDef="let client">
          <div class="fw-500">{{client.clientName}}</div>
          <div class="text-small text-muted" *ngIf="client.clientPhoneNumber">{{client.clientPhoneNumber}}</div>
        </td>
      </ng-container>

      <ng-container matColumnDef="clientLocation">
        <th mat-header-cell *matHeaderCellDef> Location </th>
        <td mat-cell *matCellDef="let client"> {{client.clientLocation || '-'}} </td>
      </ng-container>

      <ng-container matColumnDef="status">
        <th mat-header-cell *matHeaderCellDef> Status </th>
        <td mat-cell *matCellDef="let client">
          <mat-slide-toggle
            [checked]="client.status"
            color="primary"
            (change)="toggleClientStatus(client)"
            [disabled]="!isAdmin"
            [matTooltip]="isAdmin ? (client.status ? 'Deactivate' : 'Activate') : ''">
            {{client.status ? 'Active' : 'Inactive'}}
          </mat-slide-toggle>
        </td>
      </ng-container>

      <ng-container matColumnDef="actions">
        <th mat-header-cell *matHeaderCellDef class="text-right"> Actions </th>
        <td mat-cell *matCellDef="let client" class="text-right">
          <button mat-icon-button color="primary" matTooltip="Edit" (click)="openEditForm(client)">
            <mat-icon>edit</mat-icon>
          </button>
        </td>
      </ng-container>

      <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
      <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>
      
      <tr class="mat-row" *matNoDataRow>
        <td class="mat-cell text-center p-4" [attr.colspan]="displayedColumns.length">
          No clients found matching "{{searchTerm}}"
        </td>
      </tr>
    </table>
  </div>
</div>

<div class="slide-panel-overlay" *ngIf="showFormPanel" (click)="closeFormPanel()"></div>
<div class="slide-panel" [class.open]="showFormPanel">
  <app-client-form-panel
    *ngIf="showFormPanel"
    [mode]="selectedClient ? 'edit' : 'add'"
    [client]="selectedClient"
    (close)="closeFormPanel()"
    (actionComplete)="onActionComplete($event)">
  </app-client-form-panel>
</div>
