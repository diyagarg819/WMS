<div class="page-container">
  <div class="page-header">
    <h1>Audit Logs</h1>
    <p>View system-wide data modifications</p>
  </div>

  <div class="filters-container mat-elevation-z1">
    <mat-form-field appearance="outline">
      <mat-label>Enter a date range</mat-label>
      <mat-date-range-input [rangePicker]="picker">
        <input matStartDate placeholder="Start date" [(ngModel)]="startDate">
        <input matEndDate placeholder="End date" [(ngModel)]="endDate">
      </mat-date-range-input>
      <mat-datepicker-toggle matSuffix [for]="picker"></mat-datepicker-toggle>
      <mat-date-range-picker #picker></mat-date-range-picker>
    </mat-form-field>
    <button mat-raised-button color="primary" (click)="applyFilter()" [disabled]="isLoading || (!startDate && !endDate)">Apply Filter</button>
    <button mat-button (click)="clearFilter()" [disabled]="isLoading || (!startDate && !endDate)">Clear</button>
  </div>

  <div class="table-container mat-elevation-z1">
    <div class="loading-shade" *ngIf="isLoading">
      <mat-spinner diameter="40"></mat-spinner>
    </div>

    <table mat-table [dataSource]="dataSource">
      <!-- Audit ID Column -->
      <ng-container matColumnDef="auditId">
        <th mat-header-cell *matHeaderCellDef> ID </th>
        <td mat-cell *matCellDef="let log"> #{{log.auditId}} </td>
      </ng-container>

      <!-- Entity Name Column -->
      <ng-container matColumnDef="entityName">
        <th mat-header-cell *matHeaderCellDef> Entity </th>
        <td mat-cell *matCellDef="let log"> {{log.entityName}} </td>
      </ng-container>

      <!-- Record ID Column -->
      <ng-container matColumnDef="recordId">
        <th mat-header-cell *matHeaderCellDef> Record ID </th>
        <td mat-cell *matCellDef="let log"> {{log.recordId}} </td>
      </ng-container>

      <!-- Action Column -->
      <ng-container matColumnDef="action">
        <th mat-header-cell *matHeaderCellDef> Action </th>
        <td mat-cell *matCellDef="let log"> 
          <span class="status-badge" [ngClass]="{
            'status-active': log.action === 'Insert' || log.action === 'Approved',
            'status-inactive': log.action === 'Delete' || log.action === 'Rejected',
            'status-pending': log.action === 'Update'
          }">
            {{log.action}}
          </span>
        </td>
      </ng-container>

      <!-- Created By Column -->
      <ng-container matColumnDef="createdBy">
        <th mat-header-cell *matHeaderCellDef> User ID </th>
        <td mat-cell *matCellDef="let log"> {{log.createdBy}} </td>
      </ng-container>

      <!-- Created On Column -->
      <ng-container matColumnDef="createdOn">
        <th mat-header-cell *matHeaderCellDef> Date </th>
        <td mat-cell *matCellDef="let log"> {{log.createdOn | date:'medium'}} </td>
      </ng-container>

      <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
      <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>
      
      <!-- No Data Row -->
      <tr class="mat-row" *matNoDataRow>
        <td class="mat-cell empty-cell" colspan="6">
          <mat-icon>history</mat-icon>
          <p>No audit logs found.</p>
        </td>
      </tr>
    </table>

    
  </div>
</div>
