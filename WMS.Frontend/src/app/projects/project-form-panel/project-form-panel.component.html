<div class="panel-header">
  <h2>{{ mode === 'create' ? 'New Project' : 'Edit Project' }}</h2>
  <button mat-icon-button (click)="onCancel()" aria-label="Close panel">
    <mat-icon>close</mat-icon>
  </button>
</div>

<div class="panel-content">
  <div *ngIf="errorMessage" class="error-banner">
    <mat-icon>error_outline</mat-icon>
    <span>{{ errorMessage }}</span>
  </div>

  <form [formGroup]="projectForm" class="panel-form" (ngSubmit)="onSubmit()">
    <mat-form-field appearance="outline" class="w-100">
      <mat-label>Project Name</mat-label>
      <input matInput formControlName="projectName" placeholder="Enter project name">
      <mat-error *ngIf="projectForm.get('projectName')?.hasError('required')">
        Project Name is required
      </mat-error>
    </mat-form-field>

    <mat-form-field appearance="outline" class="w-100">
      <mat-label>Client</mat-label>
      <mat-select formControlName="clientId">
        <mat-option [value]="null">Internal / None</mat-option>
        <mat-option *ngFor="let c of clients" [value]="c.clientId">
          {{ c.clientName }}
        </mat-option>
      </mat-select>
    </mat-form-field>

    <div class="date-row">
      <mat-form-field appearance="outline" class="w-100">
        <mat-label>Start Date</mat-label>
        <input matInput [matDatepicker]="startPicker" formControlName="startDate">
        <mat-datepicker-toggle matIconSuffix [for]="startPicker"></mat-datepicker-toggle>
        <mat-datepicker #startPicker></mat-datepicker>
      </mat-form-field>

      <mat-form-field appearance="outline" class="w-100">
        <mat-label>End Date</mat-label>
        <input matInput [matDatepicker]="endPicker" formControlName="endDate">
        <mat-datepicker-toggle matIconSuffix [for]="endPicker"></mat-datepicker-toggle>
        <mat-datepicker #endPicker></mat-datepicker>
      </mat-form-field>
    </div>

    <mat-form-field appearance="outline" class="w-100">
      <mat-label>Status</mat-label>
      <mat-select formControlName="status">
        <mat-option *ngFor="let s of statuses" [value]="s">{{ s }}</mat-option>
      </mat-select>
    </mat-form-field>
  </form>
</div>

<div class="panel-footer">
  <button mat-button (click)="onCancel()" [disabled]="isSaving">Cancel</button>
  <button mat-raised-button color="primary" (click)="onSubmit()" [disabled]="projectForm.invalid || isSaving">
    <mat-spinner diameter="20" *ngIf="isSaving" class="btn-spinner"></mat-spinner>
    {{ isSaving ? 'Saving...' : 'Save Project' }}
  </button>
</div>
