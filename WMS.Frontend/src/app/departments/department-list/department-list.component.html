<div class="page-container" [class.panel-open]="showFormPanel">
  <div class="page-header">
    <div class="header-titles">
      <h1>Departments</h1>
      <p>View and manage company departments.</p>
    </div>
    <div class="header-actions" *ngIf="canManageDepartments()">
      <button mat-raised-button color="primary" (click)="openCreatePanel()">
        <mat-icon>add</mat-icon>
        New Department
      </button>
    </div>
  </div>

  <app-notification-banner
    [type]="bannerType"
    [message]="bannerMessage"
    [visible]="showBanner"
    (dismissed)="showBanner = false">
  </app-notification-banner>

  <div class="card table-card">
    <div class="filters-container">
      <div class="search-box">
        <mat-icon>search</mat-icon>
        <input type="text" placeholder="Search departments..." (input)="onSearch($event)">
      </div>
    </div>

    <div class="table-container">
      <div class="loading-shade" *ngIf="isLoading">
        <mat-spinner diameter="40"></mat-spinner>
      </div>

      <table mat-table [dataSource]="departments" class="w-100">
        <!-- Name Column -->
        <ng-container matColumnDef="departmentName">
          <th mat-header-cell *matHeaderCellDef> Department Name </th>
          <td mat-cell *matCellDef="let element"> 
            <strong>{{ element.departmentName }}</strong> 
          </td>
        </ng-container>

        <!-- Description Column -->
        <ng-container matColumnDef="description">
          <th mat-header-cell *matHeaderCellDef> Description </th>
          <td mat-cell *matCellDef="let element"> 
            {{ element.description || 'N/A' }}
          </td>
        </ng-container>

        <!-- CreatedOn Column -->
        <ng-container matColumnDef="createdOn">
          <th mat-header-cell *matHeaderCellDef> Created On </th>
          <td mat-cell *matCellDef="let element"> 
            {{ element.createdOn | date:'mediumDate' }}
          </td>
        </ng-container>

        <!-- Actions Column -->
        <ng-container matColumnDef="actions">
          <th mat-header-cell *matHeaderCellDef> Actions </th>
          <td mat-cell *matCellDef="let element">
            <button mat-icon-button color="accent" *ngIf="canManageDepartments()" (click)="openEditPanel(element)" matTooltip="Edit">
              <mat-icon>edit</mat-icon>
            </button>
            <button mat-icon-button color="warn" *ngIf="canManageDepartments()" (click)="deleteDepartment(element)" matTooltip="Delete">
              <mat-icon>delete</mat-icon>
            </button>
          </td>
        </ng-container>

        <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
        <tr mat-row *matRowDef="let row; columns: displayedColumns;" class="row-hover"></tr>
        
        <!-- Empty row -->
        <tr class="mat-row" *matNoDataRow>
          <td class="mat-cell empty-cell" [attr.colspan]="displayedColumns.length">
            No departments found.
          </td>
        </tr>
      </table>

      
    </div>
  </div>
</div>

<!-- Backdrop -->
<div class="panel-backdrop" *ngIf="showFormPanel" (click)="closePanel()"></div>

<!-- Slide Panel for Department Form -->
<app-slide-panel [isOpen]="showFormPanel">
  <app-department-form-panel 
    *ngIf="showFormPanel"
    [mode]="formMode"
    [department]="selectedDepartment"
    (closePanel)="closePanel()"
    (actionComplete)="onFormComplete($event)">
  </app-department-form-panel>
</app-slide-panel>
