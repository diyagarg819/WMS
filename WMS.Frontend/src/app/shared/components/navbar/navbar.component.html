<mat-toolbar color="primary" class="app-toolbar">
  <button mat-icon-button (click)="toggleSidenav.emit()">
    <mat-icon>menu</mat-icon>
  </button>
  
  <span class="spacer"></span>

  <button mat-icon-button (click)="toggleTheme()" matTooltip="Toggle Dark Mode">
    <mat-icon>{{ (isDarkMode$ | async) ? 'light_mode' : 'dark_mode' }}</mat-icon>
  </button>

  <button mat-flat-button [matMenuTriggerFor]="userMenu" class="user-account-btn">
    <mat-icon>account_circle</mat-icon>
    <span style="margin-left: 8px;">{{ authService.getUsername() }}</span>
  </button>

  <mat-menu #userMenu="matMenu">
    <button mat-menu-item (click)="logout()">
      <mat-icon>logout</mat-icon>
      <span>Logout</span>
    </button>
  </mat-menu>
</mat-toolbar>
