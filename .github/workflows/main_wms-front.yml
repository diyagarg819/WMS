name: Build and deploy Node.js app to Azure Web App - wms-front

on:
  push:
    branches:
      - main
    paths:
      - 'WMS.Frontend/**'
      - '.github/workflows/main_wms-front.yml'
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20.x'
          cache: 'npm'
          cache-dependency-path: 'WMS.Frontend/package-lock.json'

      - name: npm install and build
        run: |
          npm install
          npm run build -- --configuration=production
        working-directory: WMS.Frontend

      - name: Upload artifact for deployment job
        uses: actions/upload-artifact@v4
        with:
          name: node-app
          path: WMS.Frontend/dist/wms.frontend/browser

  deploy:
    runs-on: windows-latest
    needs: build
    
    steps:
      - name: Download artifact from build job
        uses: actions/download-artifact@v4
        with:
          name: node-app
          path: .
      
      - name: Deploy to Azure Web App
        id: deploy-to-webapp
        uses: azure/webapps-deploy@v3
        with:
          app-name: 'wms-front'
          slot-name: 'Production'
          package: .
          publish-profile: ${{ secrets.AZUREAPPSERVICE_PUBLISHPROFILE_EB30C3F1FEB54A98B8638CA97BA53AB2 }}